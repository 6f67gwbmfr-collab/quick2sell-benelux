<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick2Sell Pro</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;background:#F7F5F1;color:#1a1a1a}
.app{max-width:520px;margin:auto;padding:22px 16px 40px}
h1{font-size:32px;margin:16px 0 4px}
.sub{color:#666;margin:0 0 20px}
.card{background:#fff;border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 8px 28px #0001}
label{font-weight:800;display:block;margin-bottom:8px}
input,textarea,button{width:100%;font-size:16px;border-radius:14px;padding:14px;margin-top:10px;border:1px solid #ddd;box-sizing:border-box}
textarea{min-height:85px}
button{border:0;background:#FF6A00;color:white;font-weight:900}
button:disabled{opacity:.5}
.preview{display:flex;flex-wrap:wrap;margin-top:12px}
.preview img{width:88px;height:88px;object-fit:cover;border-radius:14px;margin:5px;border:1px solid #ddd}
.result{white-space:pre-wrap;line-height:1.55;font-size:15px}
.badge{display:inline-block;background:#2F6F4F;color:white;border-radius:999px;padding:4px 10px;font-size:12px}
.footer{font-size:12px;color:#777;text-align:center;margin-top:22px}
</style>
</head>
<body>
<div class="app">
  <h1>🏷️ Quick2Sell <span class="badge">Pro</span></h1>
  <p class="sub">Foto. Taxeer. Verkoop.</p>

  <div class="card">
    <label>1. Upload productfoto’s</label>
    <input id="photos" type="file" accept="image/*" multiple>
    <div id="preview" class="preview"></div>
  </div>

  <div class="card">
    <label>2. Extra info</label>
    <textarea id="notes" placeholder="Bijv. Volkswagen Golf 7, bouwjaar 2016, 180.000 km, schade, accessoires..."></textarea>
    <button id="analyzeBtn">Analyseer met AI</button>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <label>3. Quick2Sell AI Analyse</label>
    <div id="result" class="result"></div>
  </div>

  <p class="footer">AI-analyse met OpenAI via veilige Vercel-backend.</p>
</div>

<script>
const photos = document.getElementById("photos");
const preview = document.getElementById("preview");
const analyzeBtn = document.getElementById("analyzeBtn");
const resultCard = document.getElementById("resultCard");
const result = document.getElementById("result");

let imageData = [];

photos.onchange = async () => {
  preview.innerHTML = "";
  imageData = [];

  const files = [...photos.files].slice(0, 8);

  for (const file of files) {
    const dataUrl = await resizeImage(file);
    imageData.push(dataUrl);

    const img = document.createElement("img");
    img.src = dataUrl;
    preview.appendChild(img);
  }
};

function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();

      img.onload = () => {
        const max = 1200;
        let w = img.width;
        let h = img.height;

        if (w > h && w > max) {
          h = Math.round(h * max / w);
          w = max;
        } else if (h > max) {
          w = Math.round(w * max / h);
          h = max;
        }

        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);

        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };

      img.onerror = reject;
      img.src = e.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

analyzeBtn.onclick = async () => {
  if (!imageData.length) {
    alert("Upload eerst minimaal één foto.");
    return;
  }

  analyzeBtn.disabled = true;
  analyzeBtn.textContent = "AI analyseert...";
  resultCard.style.display = "block";
  result.textContent = "Bezig met herkennen, taxeren en advertentie maken...";

  try {
    const response = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        images: imageData,
        notes: document.getElementById("notes").value
      })
    });

    const data = await response.json();

    if (!response.ok) {
      result.textContent = "Fout: " + (data.error || "Analyse mislukt");
      return;
    }

    result.textContent = data.result || "Geen resultaat ontvangen.";
  } catch (err) {
    result.textContent = "Verbindingsfout: " + err.message;
  } finally {
    analyzeBtn.disabled = false;
    analyzeBtn.textContent = "Analyseer met AI";
  }
};
</script>
</body>
</html>
